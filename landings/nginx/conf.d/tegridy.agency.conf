server {
    listen 80;
    server_name tegridy.agency;
    root /var/www/tegridy.agency;

    # Redirect for /model
    location = /model {
        return 301 https://form.asana.com/?k=_i2aW1PvQTtSM5ldLjA9xA&d=1206405818803094;
    }

    # Redirect for /operator
    location = /operator {
        return 301 https://form.asana.com/?k=06TJIp0HyieE3jba-MlwBA&d=1206405818803094;
    }

    location /base {
                 # Passes requests to the application running on port 8080
        proxy_pass http://127.0.0.1:4321;
        
        # Standard headers to preserve original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Optional: Catch-all for other paths (can redirect to a default page or show 404)
    location / {
        # You might want to return a 404 or redirect elsewhere
        return 404;
        # try_files $uri $uri/ =404;
    }
} 
