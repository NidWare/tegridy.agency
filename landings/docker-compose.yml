version: '3.7'

services:
  traefik:
    image: traefik:v2.9
    command:
      # Включаем панель управления Traefik (только для тестирования, для продакшена рекомендуется ограничить доступ)
      - "--api.insecure=true"
      # Включаем поддержку Docker в качестве провайдера
      - "--providers.docker=true"
      # Определяем точки входа для HTTP и HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Add HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Certificate configuration
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=courselandinghost@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--providers.docker.exposedByDefault=false"
      # Enable file provider for static certificates
      - "--providers.file.directory=/certificates"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt:rw"
      - "./certificates:/certificates:ro"
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./www/emilymell.com:/var/www/emilymell.com:ro
      - ./www/reginared.com:/var/www/reginared.com:ro
      - ./www/vikaray.com:/var/www/vikaray.com:ro
      - ./www/leraruud.com:/var/www/leraruud.com:ro
      - ./www/vikaregina.com:/var/www/vikaregina.com:ro
      - ./www/tegridy.agency:/var/www/tegridy.agency:ro
      - ./www/mirabuns.com:/var/www/mirabuns.com:ro
      - ./www/kiraaura.com:/var/www/kiraaura.com:ro
      - ./www/milanafox.com:/var/www/milanafox.com:ro
      - ./nginx/logs:/var/log/nginx
    labels:
      - "traefik.enable=true"
      # EmillyMell - modified to use static certificate
      - "traefik.http.routers.emilymell-http.rule=Host(`emilymell.com`)"
      - "traefik.http.routers.emilymell-http.entrypoints=web"
      - "traefik.http.routers.emilymell-http.service=emilymell"
      - "traefik.http.services.emilymell.loadbalancer.server.port=80"
      - "traefik.http.routers.emilymell.rule=Host(`emilymell.com`)"
      - "traefik.http.routers.emilymell.entrypoints=websecure"
      - "traefik.http.routers.emilymell.tls=true"
      - "traefik.http.routers.emilymell.service=emilymell"
      - "traefik.http.routers.emilymell.tls.certresolver="  # Remove Let's Encrypt for this domain
      # ReginaRed
      - "traefik.http.routers.reginared-http.rule=Host(`reginared.com`)"
      - "traefik.http.routers.reginared-http.entrypoints=web"
      - "traefik.http.routers.reginared-http.service=reginared"
      - "traefik.http.services.reginared.loadbalancer.server.port=80"
      - "traefik.http.routers.reginared.rule=Host(`reginared.com`)"
      - "traefik.http.routers.reginared.entrypoints=websecure"
      - "traefik.http.routers.reginared.tls=true"
      - "traefik.http.routers.reginared.service=reginared"
      # VikaRay
      - "traefik.http.routers.vikaray-http.rule=Host(`vikaray.com`)"
      - "traefik.http.routers.vikaray-http.entrypoints=web"
      - "traefik.http.routers.vikaray-http.service=vikaray"
      - "traefik.http.services.vikaray.loadbalancer.server.port=80"
      - "traefik.http.routers.vikaray.rule=Host(`vikaray.com`)"
      - "traefik.http.routers.vikaray.entrypoints=websecure"
      - "traefik.http.routers.vikaray.tls=true"
      - "traefik.http.routers.vikaray.service=vikaray"
      # LeraRuud
      - "traefik.http.routers.leraruud-http.rule=Host(`leraruud.com`)"
      - "traefik.http.routers.leraruud-http.entrypoints=web"
      - "traefik.http.routers.leraruud-http.service=leraruud"
